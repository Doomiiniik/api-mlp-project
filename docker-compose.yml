version: "3.9"

services:
  mlp-api:
    build: .
    container_name: mlp-api
    ports:
      - "8000:8000"
    networks:
      - mlp-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - mlp-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - mlp-net

networks:
  mlp-net:

volumes:
  prometheus_data:
  grafana_data:
